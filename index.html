<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR-p7tiF4pX85suSP_ZLvyqBNRTnwfQj0p1ng&s">
    <title>Calculator</title>
</head>
<body>
    <script src="script.js" defer></script>
    <div class="calculator-body">
        <div class="text">
            <p class="text2"></p>
        </div>
        <div class="buttons">
            <div class="row1">
                <button class="clear">Clear</button>
                <button class="on-off">On/Off</button>
            </div>
            <div class="row2">
                <button class="one">1</button>
                <button class="two">2</button>
                <button class="three">3</button>
                <button class="addition">+</button>
            </div>
            <div class="row3">
                <button class="four">4</button>
                <button class="five">5</button>
                <button class="six">6</button>
                <button class="subtraction">-</button>
            </div>
            <div class="row4">
                <button class="seven">7</button>
                <button class="eight">8</button>
                <button class="nine">9</button>
                <button class="multiplication">*</button>
            </div>
            <div class="row5">
                <button class="0">0</button>
                <button class="dot">.</button>
                <button class="enter">Enter</button>
                <button class="division">/</button>
            </div>
        </div>
    </div>
</body>
</html>
